# ════════════════════════════════════════════════════════════
# MediMesh — NFS Provisioner RBAC
# ════════════════════════════════════════════════════════════

apiVersion: v1
kind: ServiceAccount
metadata:
  name: nfs-provisioner
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "medimesh.labels" . | nindent 4 }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-nfs-provisioner-runner
  labels:
    {{- include "medimesh.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "update", "patch"]
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-nfs-provisioner-binding
  labels:
    {{- include "medimesh.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: nfs-provisioner
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-nfs-provisioner-runner
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nfs-provisioner-leader
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "medimesh.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nfs-provisioner-leader-binding
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "medimesh.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: nfs-provisioner
    namespace: {{ .Values.global.namespace }}
roleRef:
  kind: Role
  name: nfs-provisioner-leader
  apiGroup: rbac.authorization.k8s.io
