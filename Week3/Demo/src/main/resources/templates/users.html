<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Simple User App</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #89f7fe, #66a6ff);
            margin: 0;
            padding: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            text-align: center;
            color: #003366;
            animation: slideDown 1s ease forwards;
        }

        form {
            width: 300px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            animation: floatUp 1.2s ease;
        }

        input[type="text"] {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 2px solid #66a6ff;
            border-radius: 5px;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #003366;
            box-shadow: 0 0 10px rgba(0, 51, 102, 0.3);
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #0055aa;
            transform: scale(1.05);
        }

        table {
            width: 70%;
            margin: 30px auto;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            animation: fadeIn 1.5s ease;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
            transition: 0.3s;
        }

        tr:hover {
            background: #f0f8ff;
            transform: scale(1.01);
        }

        th {
            background: #003366;
            color: white;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes floatUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>

</head>
<body>

<h2>Add User</h2>
<form action="/add" method="post">
    Name: <input type="text" name="name"><br><br>
    Email: <input type="text" name="email"><br><br>
    <button type="submit">Add User</button>
</form>

<hr>

<h2>All Users</h2>
<table>
    <tr>
        <th>ID</th><th>Name</th><th>Email</th>
    </tr>

    <tr th:each="u : ${users}">
        <td th:text="${u.id}"></td>
        <td th:text="${u.name}"></td>
        <td th:text="${u.email}"></td>
    </tr>
</table>

</body>
</html>
