apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-demo
spec:
  replicas: 2

  selector:
    matchLabels:
      app: spring-demo

  template:
    metadata:
      labels:
        app: spring-demo

    spec:
      containers:
      - name: spring-demo
        image: secretpower/springbootconfig
        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: spring-config

        - secretRef:
            name: spring-secret
