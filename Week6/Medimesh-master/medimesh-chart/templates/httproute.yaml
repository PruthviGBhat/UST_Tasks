{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: medimesh-routes
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ .Values.frontend.name }}
          port: {{ .Values.frontend.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ .Values.services.bff.name }}
          port: {{ .Values.services.bff.port }}
    {{- range $key, $svc := .Values.services }}
    {{- if ne $key "bff" }}
    - matches:
        - path:
            type: PathPrefix
            value: /{{ $key }}
      backendRefs:
        - name: {{ $svc.name }}
          port: {{ $svc.port }}
    {{- end }}
    {{- end }}
{{- end }}
