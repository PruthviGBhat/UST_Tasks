# ════════════════════════════════════════════════════════════
# MediMesh — Secrets (Sensitive Configuration)
# ════════════════════════════════════════════════════════════
#
# Base64 Encoded Values:
#   medimesh-jwt-secret-2024  → bWVkaW1lc2gtand0LXNlY3JldC0yMDI0
#   admin                     → YWRtaW4=
#   password123               → cGFzc3dvcmQxMjM=
#   medimeshAdmin             → bWVkaW1lc2hBZG1pbg==
#   medimeshPass2024          → bWVkaW1lc2hQYXNzMjAyNA==
#
# To encode your own values:  echo -n "your-value" | base64
# ════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: medimesh-secrets
  namespace: medimesh
  labels:
    app: medimesh
    tier: config
type: Opaque
data:
  # ─── JWT ────────────────────────────────────────────────
  JWT_SECRET: bWVkaW1lc2gtand0LXNlY3JldC0yMDI0

  # ─── Admin Credentials ─────────────────────────────────
  ADMIN_USERNAME: YWRtaW4=
  ADMIN_PASSWORD: cGFzc3dvcmQxMjM=

  # ─── MongoDB Credentials ───────────────────────────────
  MONGO_INITDB_ROOT_USERNAME: bWVkaW1lc2hBZG1pbg==
  MONGO_INITDB_ROOT_PASSWORD: bWVkaW1lc2hQYXNzMjAyNA==
