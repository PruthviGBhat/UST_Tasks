# ════════════════════════════════════════════════════════════
# MediMesh — Secrets (Sensitive data, base64 encoded)
# ════════════════════════════════════════════════════════════

apiVersion: v1
kind: Secret
metadata:
  name: medimesh-secrets
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "medimesh.labels" . | nindent 4 }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  ADMIN_USERNAME: {{ .Values.secrets.adminUsername | quote }}
  ADMIN_PASSWORD: {{ .Values.secrets.adminPassword | quote }}
