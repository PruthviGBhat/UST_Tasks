{{- range $key, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $svc.name }}
    tier: backend
    service: {{ $key }}
spec:
  replicas: {{ $.Values.backend.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ $.Values.backend.strategy.maxUnavailable }}
      maxSurge: {{ $.Values.backend.strategy.maxSurge }}
  selector:
    matchLabels:
      app: {{ $svc.name }}
      tier: backend
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
        tier: backend
        service: {{ $key }}
    spec:
      {{- if $svc.dbName }}
      initContainers:
        - name: wait-for-mongodb
          image: "{{ $.Values.backend.initContainer.image }}:{{ $.Values.backend.initContainer.tag }}"
          command:
            - sh
            - -c
            - |
              echo "Waiting for MongoDB..."
              until nc -z medimesh-mongodb {{ $.Values.mongodb.port }}; do
                echo "MongoDB not ready, retrying in 3s..."
                sleep 3
              done
              echo "MongoDB is ready!"
      {{- end }}
      containers:
        - name: {{ $svc.name }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $svc.image }}:{{ $.Values.backend.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          env:
            - name: PORT
              value: "{{ $svc.port }}"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: NODE_ENV
            {{- if $svc.dbName }}
            - name: MONGO_URI
              value: "mongodb://medimesh-mongodb:{{ $.Values.mongodb.port }}/{{ $svc.dbName }}"
            {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medimesh-secrets
                  key: JWT_SECRET
            {{- if eq $key "auth" }}
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: medimesh-secrets
                  key: ADMIN_USERNAME
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: medimesh-secrets
                  key: ADMIN_PASSWORD
            {{- end }}
            {{- if eq $key "bff" }}
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: AUTH_SERVICE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: USER_SERVICE_URL
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: DOCTOR_SERVICE_URL
            - name: APPOINTMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: APPOINTMENT_SERVICE_URL
            - name: VITALS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: VITALS_SERVICE_URL
            - name: PHARMACY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: PHARMACY_SERVICE_URL
            - name: AMBULANCE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: AMBULANCE_SERVICE_URL
            - name: COMPLAINT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: COMPLAINT_SERVICE_URL
            - name: FORUM_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: medimesh-config
                  key: FORUM_SERVICE_URL
            {{- end }}
          readinessProbe:
            httpGet:
              path: {{ $.Values.backend.probes.readiness.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $.Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.backend.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: {{ $.Values.backend.probes.liveness.path }}
              port: {{ $svc.port }}
            initialDelaySeconds: {{ $.Values.backend.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.backend.probes.liveness.periodSeconds }}
          resources:
            requests:
              memory: {{ $.Values.backend.resources.requests.memory }}
              cpu: {{ $.Values.backend.resources.requests.cpu }}
            limits:
              memory: {{ $.Values.backend.resources.limits.memory }}
              cpu: {{ $.Values.backend.resources.limits.cpu }}
{{- end }}
