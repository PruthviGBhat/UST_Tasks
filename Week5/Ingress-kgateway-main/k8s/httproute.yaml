---
 
# ── 4. Frontend – catch-all ──────────────────────────────────────
# No CORS needed — served from the same origin.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: banking
spec:
  parentRefs:
    - name: banking-gateway
      namespace: banking
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
