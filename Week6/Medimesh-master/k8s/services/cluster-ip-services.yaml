# ════════════════════════════════════════════════════════════
# MediMesh — All ClusterIP Services (Internal Communication)
# ════════════════════════════════════════════════════════════
# These services enable internal DNS-based communication
# between microservices within the medimesh namespace.
# Frontend NodePort service is in frontend/frontend-deployment.yaml
# MongoDB headless service is in mongodb/mongodb-statefulset.yaml
# ════════════════════════════════════════════════════════════

# ─── Auth Service (ClusterIP) ────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: medimesh-auth-svc
  namespace: medimesh
  labels:
    app: medimesh-auth
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: medimesh-auth
    tier: backend
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
      name: http

---
