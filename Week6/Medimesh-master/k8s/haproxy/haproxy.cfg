# ════════════════════════════════════════════════════════════
# MediMesh — HAProxy Configuration
# ════════════════════════════════════════════════════════════
# This config runs on a SEPARATE EC2 instance (HAProxy LB).
# It load-balances external traffic (port 80) to the
# kGateway NodePort on both K8s worker nodes.
#
# IMPORTANT: Replace <KGATEWAY_NODEPORT> with the actual
# NodePort assigned to the kGateway service. Find it with:
#   kubectl get svc -n medimesh | grep gateway
# ════════════════════════════════════════════════════════════

global
    log /dev/log    local0
    log /dev/log    local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    option  http-server-close
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# ─── Stats Dashboard ──────────────────────────────────────
# Access at http://<HAPROXY_IP>:8404/stats
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats realm HAProxy\ Statistics
    stats auth admin:medimesh2026
    stats refresh 10s

# ─── Frontend: Accept HTTP on port 80 ─────────────────────
frontend http_front
    bind *:80
    default_backend kgateway_backend

# ─── Backend: kGateway NodePort on worker nodes ────────────
# Replace <KGATEWAY_NODEPORT> with the actual NodePort value
backend kgateway_backend
    balance roundrobin
    option httpchk
    http-check send meth GET uri / ver HTTP/1.1 hdr Host localhost
    http-check expect status 200

    # Worker Node 1
    server worker1 172.31.94.132:<KGATEWAY_NODEPORT> check inter 5s fall 3 rise 2
    # Worker Node 2
    server worker2 172.31.87.146:<KGATEWAY_NODEPORT> check inter 5s fall 3 rise 2
